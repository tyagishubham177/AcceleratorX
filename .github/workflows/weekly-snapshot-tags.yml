name: Weekly snapshot tags

on:
  schedule:
    - cron: "17 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-snapshot-tags
  cancel-in-progress: false

jobs:
  create-and-prune-tags:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create weekly snapshot tag and retain the latest five
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tag_name="weekly-snapshot-$(date -u +%Y-%m-%d)"

          if git rev-parse "$tag_name" >/dev/null 2>&1; then
            echo "Tag $tag_name already exists. Skipping creation."
          else
            git tag -a "$tag_name" -m "Weekly snapshot of main created on $(date -u +%Y-%m-%d)"
            git push origin "$tag_name"
          fi

          mapfile -t snapshot_tags < <(
            git for-each-ref \
              --sort=-creatordate \
              --format='%(refname:short)' \
              'refs/tags/weekly-snapshot-*'
          )

          if (( ${#snapshot_tags[@]} > 5 )); then
            for old_tag in "${snapshot_tags[@]:5}"; do
              echo "Deleting old snapshot tag: $old_tag"
              git tag -d "$old_tag"
              git push origin ":refs/tags/$old_tag"
            done
          fi
