name: Reconcile Luna metadata

on:
  push:
    branches:
      - cleanup/repo-navigation-evidence
    paths:
      - .github/scripts/reconcile_luna_metadata.py
      - .github/workflows/reconcile-luna-metadata.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/repo-navigation-evidence
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
          python -m pip install python-docx pypdf

      - name: Patch full documents and run consistency audit
        run: python .github/scripts/reconcile_luna_metadata.py

      - name: Commit reconciled documents
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Reconcile full documents on Luna temperature 0.2 [skip ci]"
          git push origin HEAD:cleanup/repo-navigation-evidence
