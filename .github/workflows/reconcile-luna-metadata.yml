name: Reconcile Luna metadata

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - .github/scripts/reconcile_luna_metadata.py
      - .github/workflows/reconcile-luna-metadata.yml

permissions:
  contents: write

jobs:
  reconcile:
    if: github.head_ref == 'cleanup/repo-navigation-evidence'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/repo-navigation-evidence
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
          python -m pip install python-docx pypdf

      - name: Patch documents and capture exact audit findings
        run: |
          set +e
          python .github/scripts/reconcile_luna_metadata.py > /tmp/consistency-audit.log 2>&1
          status=$?
          cat /tmp/consistency-audit.log
          cp /tmp/consistency-audit.log consistency-audit.log
          echo "audit_status=$status"
          exit 0

      - name: Commit generated documents and diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture exact Luna consistency findings [skip ci]"
          git push origin HEAD:cleanup/repo-navigation-evidence
